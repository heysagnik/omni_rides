publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_fonts: ^6.2.1
  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.4
  http: ^1.6.0
  geolocator: ^13.0.2
  firebase_core: ^4.5.0
  flutter_svg: ^2.0.10+1
  flutter_dotenv: ^6.0.0
  firebase_messaging: ^16.1.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  google_maps_flutter: ^2.9.0
  flutter_secure_storage: ^10.0.0
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
